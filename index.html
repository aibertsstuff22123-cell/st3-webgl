<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Slendytubbies 3 Multiplayer</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
#loading-text {
  font-weight: bold;
  background: linear-gradient(
    270deg,
    #ff0000,
    #ff7f00,
    #ffff00,
    #00ff00,
    #0000ff,
    #4b0082,
    #8f00ff
  );
  background-size: 400% 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbow 3s ease infinite;
}
@keyframes rainbow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
    </style>
  </head>
  <body>
    <div id="loading-text"
    style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;"> LOADING...
    </div>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
<script>
var loadingText = document.querySelector("#loading-text");
var container = document.querySelector("#unity-container");
var canvas = document.querySelector("#unity-canvas");
var loadingBar = document.querySelector("#unity-loading-bar");
var progressBarFull = document.querySelector("#unity-progress-bar-full");
var warningBanner = document.querySelector("#unity-warning");

function unityShowBanner(msg, type) {}

var NUM_CHUNKS = 9;
var TOTAL_BYTES = 826702854;
var bytesLoaded = 0;

function setProgress(pct, text) {
  progressBarFull.style.width = (pct * 100) + "%";
  loadingText.innerHTML = text;
}

function fetchChunk(index) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "Build/chunks/ST3.data.part" + index, true);
    xhr.responseType = "arraybuffer";
    xhr.onprogress = function(e) {
      if (e.lengthComputable) {
        var done = bytesLoaded + e.loaded;
        setProgress(done / TOTAL_BYTES, "LOADING... " + Math.round(done / TOTAL_BYTES * 100) + "%");
      }
    };
    xhr.onload = function() {
      if (xhr.status === 200) {
        resolve(new Uint8Array(xhr.response));
      } else {
        reject(new Error("Chunk " + index + " failed"));
      }
    };
    xhr.onerror = function() { reject(new Error("Network error on chunk " + index)); };
    xhr.send();
  });
}

async function downloadData() {
  var chunks = [];
  for (var i = 0; i < NUM_CHUNKS; i++) {
    var chunk = await fetchChunk(i);
    bytesLoaded += chunk.byteLength;
    chunks.push(chunk);
  }
  var total = 0;
  chunks.forEach(function(c) { total += c.byteLength; });
  var merged = new Uint8Array(total);
  var offset = 0;
  chunks.forEach(function(c) { merged.set(c, offset); offset += c.byteLength; });
  return URL.createObjectURL(new Blob([merged]));
}

(async function() {
  try {
    var dataUrl = await downloadData();

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = "Build/UnityLoader.js";

    script.onload = function() {
      if (typeof createUnityInstance === "function") {
        createUnityInstance(canvas, {
          dataUrl: dataUrl,
          frameworkUrl: "Build/ST3.wasm.framework.unityweb",
          codeUrl: "Build/ST3.wasm.code.unityweb",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "Zeoworks",
          productName: "Slendytubbies 3 Multiplayer",
          productVersion: "1.11"
        }, function(progress) {
          progressBarFull.style.width = (progress * 100) + "%";
          loadingText.innerHTML = "LOADING... " + Math.round(progress * 100) + "%";
        }).then(function() {
          loadingBar.style.display = "none";
          loadingText.remove();
        }).catch(function(err) {
          alert(err);
        });
        return;
      }

      if (typeof UnityLoader !== "undefined") {
        fetch("Build/ST3.json").then(function(r) { return r.json(); }).then(function(config) {
          config.dataUrl = dataUrl;
          var configBlob = new Blob([JSON.stringify(config)], { type: "application/json" });
          var configUrl = URL.createObjectURL(configBlob);
          UnityLoader.instantiate("unity-container", configUrl, function(progress) {
            progressBarFull.style.width = (progress * 100) + "%";
            loadingText.innerHTML = "LOADING... " + Math.round(progress * 100) + "%";
            if (progress === 1) {
              loadingBar.style.display = "none";
              loadingText.remove();
            }
          });
        });
        return;
      }

      alert("Unsupported Unity loader.");
    };
    document.body.appendChild(script);
  } catch(err) {
    alert("Failed to load game data: " + err.message);
  }
})();
</script>
  </body>
</html>
